<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full‑screen 3‑D Model</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>

<body>
  <model-viewer
      alt="Drone 3D Capture"
      src="example/odm_textured_model_geo.glb"
      ar
      max-camera-orbit="90deg 60deg auto"
      max-field-of-view="30deg"
      min-field-of-view="5deg"
      poster="example/loading.webp"
      shadow-intensity="1"
      camera-controls
    >
  </model-viewer>

</body>
</html>
