    <svg id="lines" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" class="lineContainer"></svg>

<script type="module">
    const modelViewer = document.querySelector('#model-viewer');
    const svg = document.querySelector('#lines');

    let animationFrameId = null;

    modelViewer.addEventListener('load', () => {
      updateLines();

      // Camera moves
      modelViewer.addEventListener('camera-change', () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
        animationFrameId = requestAnimationFrame(updateLines);
      });

      // Window resize
      window.addEventListener('resize', () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
        animationFrameId = requestAnimationFrame(updateLines);
      });
    });

    function updateLines() {
      svg.innerHTML = '';

      const boltsByRoute = {};
      const bolts = document.querySelectorAll('.bolt');

      bolts.forEach((bolt) => {
        const route = bolt.getAttribute("route");
        if (!route) return;

        const slotName = bolt.getAttribute('slot');
        if (!slotName) return;

        // "hotspot-1" -> "1"
        const hotspotNum = slotName.replace('hotspot-', '');

        const hotspot = modelViewer.queryHotspot(slotName);

        if (hotspot && hotspot.canvasPosition) {
          const x = hotspot.canvasPosition.x;
          const y = hotspot.canvasPosition.y;

          if (!boltsByRoute[route]) {
            boltsByRoute[route] = [];
          }
          boltsByRoute[route].push({ x, y });
        }
      });

      // Draw lines
      Object.values(boltsByRoute).forEach((positions) => {
        // Draw lines from bottom to top
        positions.sort((a, b) => a.y - b.y);

        for (let i = 0; i < positions.length - 1; i++) {
          const start = positions[i];
          const end = positions[i + 1];

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', start.x);
          line.setAttribute('y1', start.y);
          line.setAttribute('x2', end.x);
          line.setAttribute('y2', end.y);
          line.setAttribute('class', 'line');
          svg.appendChild(line);
        }
      });
    }

    updateLines();
</script>
